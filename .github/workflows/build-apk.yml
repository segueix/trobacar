name: Build downloadable APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trobacar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Add workflow summary
        run: |
          {
            echo '## APK generated successfully'
            echo ''
            echo '- Artifact name: `trobacar-debug-apk`'
            echo '- File: `app/build/outputs/apk/debug/app-debug.apk`'
            echo '- Download it from the **Artifacts** section of this workflow run.'
          } >> "$GITHUB_STEP_SUMMARY"
