name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: trobacar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish download instructions
        run: |
          {
            echo '## APK generated successfully';
            echo '';
            echo 'You can download the APK from this workflow run in **Artifacts > trobacar-debug-apk**.';
            echo '';
            echo 'Generated file: `app/build/outputs/apk/debug/app-debug.apk`';
          } >> "$GITHUB_STEP_SUMMARY"
